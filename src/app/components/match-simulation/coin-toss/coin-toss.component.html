<div class="coin-toss-component fx_x-c_y-c"
    *coinToss="false as init; let msg = message; let res = result; let toss = runCoinToss;">
    <div class="coin-toss__container">
        <div class="coin-toss__teams-decider">
            
            <div class="teams-decider__teams">
                <h2 class="team">{{res ? res : msg}}</h2>
            </div>
            
        </div>
        <button class="coin-toss__init fx_x-b" [ngClass]="{'disabled-btn': res}" [disabled]="res" (click)="toss()">
            Flip Coin!
        </button>
    </div>
</div>
